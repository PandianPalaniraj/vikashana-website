<svg xmlns="http://www.w3.org/2000/svg" width="400" height="360" viewBox="0 0 400 360">
  <defs>
    <linearGradient id="capGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="leafGradL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="leafGradR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
  </defs>

  <!-- LEFT LAUREL -->
  <g transform="translate(92,168)">
    <ellipse cx="0" cy="0" rx="9" ry="14" fill="url(#leafGradL)" transform="rotate(-50)"/>
    <ellipse cx="-14" cy="-10" rx="8" ry="13" fill="url(#leafGradL)" transform="rotate(-65)"/>
    <ellipse cx="-24" cy="-22" rx="8" ry="12" fill="url(#leafGradL)" transform="rotate(-80)"/>
    <ellipse cx="-28" cy="-36" rx="7" ry="11" fill="url(#leafGradL)" transform="rotate(-95)"/>
    <ellipse cx="-26" cy="-50" rx="7" ry="10" fill="url(#leafGradL)" transform="rotate(-108)"/>
    <path d="M0 0 Q-10 -20 -22 -55" fill="none" stroke="#15803D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- RIGHT LAUREL -->
  <g transform="translate(308,168)">
    <ellipse cx="0" cy="0" rx="9" ry="14" fill="url(#leafGradR)" transform="rotate(50)"/>
    <ellipse cx="14" cy="-10" rx="8" ry="13" fill="url(#leafGradR)" transform="rotate(65)"/>
    <ellipse cx="24" cy="-22" rx="8" ry="12" fill="url(#leafGradR)" transform="rotate(80)"/>
    <ellipse cx="28" cy="-36" rx="7" ry="11" fill="url(#leafGradR)" transform="rotate(95)"/>
    <ellipse cx="26" cy="-50" rx="7" ry="10" fill="url(#leafGradR)" transform="rotate(108)"/>
    <path d="M0 0 Q10 -20 22 -55" fill="none" stroke="#15803D" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- OPEN BOOK -->
  <g transform="translate(200,170)">
    <ellipse cx="0" cy="56" rx="62" ry="9" fill="#e0e7ff" opacity="0.6"/>
    <rect x="-5" y="-2" width="10" height="58" rx="3" fill="#3730A3"/>
    <path d="M-5 0 Q-46 5 -64 12 L-64 58 Q-44 53 -5 56 Z" fill="url(#bookGrad)"/>
    <line x1="-55" y1="22" x2="-14" y2="19" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-55" y1="32" x2="-14" y2="29" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-53" y1="42" x2="-14" y2="39" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M5 0 Q46 5 64 12 L64 58 Q44 53 5 56 Z" fill="url(#bookGrad)"/>
    <line x1="55" y1="22" x2="14" y2="19" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="55" y1="32" x2="14" y2="29" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="53" y1="42" x2="14" y2="39" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-64 58 Q-32 66 0 63 Q32 66 64 58" fill="none" stroke="#3730A3" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- GRADUATION CAP -->
  <g transform="translate(200,96)">
    <polygon points="-58,-18 0,-36 58,-18 0,0" fill="url(#capGrad)"/>
    <polygon points="-58,-18 0,-36 58,-18 0,0" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <rect x="-26" y="-16" width="52" height="34" rx="5" fill="#4338CA"/>
    <polygon points="-44,-19 0,-34 44,-19 0,-4" fill="rgba(255,255,255,0.1)"/>
    <line x1="58" y1="-18" x2="58" y2="16" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <circle cx="58" cy="18" r="5" fill="#F59E0B"/>
    <line x1="55" y1="23" x2="50" y2="36" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="58" y1="23" x2="58" y2="37" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="61" y1="23" x2="66" y2="36" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- STARS -->
  <g fill="#F59E0B">
    <path d="M152,160 l4.5,9 l10,0 l-8,6 l3,10 l-9.5,-6.5 l-9.5,6.5 l3,-10 l-8,-6 l10,0 Z" transform="scale(0.88) translate(28,20)"/>
    <path d="M200,152 l5.5,11 l12,0 l-9.5,7 l3.5,11.5 l-11.5,-7.5 l-11.5,7.5 l3.5,-11.5 l-9.5,-7 l12,0 Z"/>
    <path d="M248,160 l4.5,9 l10,0 l-8,6 l3,10 l-9.5,-6.5 l-9.5,6.5 l3,-10 l-8,-6 l10,0 Z" transform="scale(0.88) translate(-28,20)"/>
  </g>

  <!-- BRAND NAME -->
  <text x="200" y="270" font-family="Georgia,Times New Roman,serif" font-size="40" font-weight="700" fill="#1E1B4B" text-anchor="middle" letter-spacing="4">VIKASHANA</text>

  <!-- DIVIDER LINE -->
  <line x1="110" y1="285" x2="290" y2="285" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="200" cy="285" r="3.5" fill="#6366F1"/>

  <!-- TAGLINE -->
  <text x="200" y="308" font-family="Arial,Helvetica,sans-serif" font-size="12.5" font-weight="600" fill="#6366F1" text-anchor="middle" letter-spacing="2.5">SCHOOL MANAGEMENT</text>

  <!-- SLOGAN -->
  <text x="200" y="332" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="400" fill="#94A3B8" text-anchor="middle" letter-spacing="1">Developing Schools · Shaping Futures</text>
</svg>
