<svg xmlns="http://www.w3.org/2000/svg" width="320" height="72" viewBox="0 0 320 72">
  <defs>
    <linearGradient id="capH" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bookH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="leafHL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="leafHR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
  </defs>

  <!-- ICON GROUP centered at x=34 -->
  <!-- Mini left laurel -->
  <g transform="translate(15,48)">
    <ellipse cx="0" cy="0" rx="5" ry="7" fill="url(#leafHL)" transform="rotate(-50)"/>
    <ellipse cx="-7" cy="-5" rx="4.5" ry="6.5" fill="url(#leafHL)" transform="rotate(-70)"/>
    <ellipse cx="-11" cy="-12" rx="4" ry="6" fill="url(#leafHL)" transform="rotate(-88)"/>
    <path d="M0 0 Q-5 -10 -10 -24" fill="none" stroke="#15803D" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Mini right laurel -->
  <g transform="translate(53,48)">
    <ellipse cx="0" cy="0" rx="5" ry="7" fill="url(#leafHR)" transform="rotate(50)"/>
    <ellipse cx="7" cy="-5" rx="4.5" ry="6.5" fill="url(#leafHR)" transform="rotate(70)"/>
    <ellipse cx="11" cy="-12" rx="4" ry="6" fill="url(#leafHR)" transform="rotate(88)"/>
    <path d="M0 0 Q5 -10 10 -24" fill="none" stroke="#15803D" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Mini book -->
  <g transform="translate(34,46)">
    <rect x="-3" y="-1" width="6" height="22" rx="2" fill="#3730A3"/>
    <path d="M-3 0 Q-22 2 -28 5 L-28 22 Q-18 20 -3 21 Z" fill="url(#bookH)"/>
    <line x1="-24" y1="8" x2="-6" y2="7" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
    <line x1="-24" y1="13" x2="-6" y2="12" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
    <path d="M3 0 Q22 2 28 5 L28 22 Q18 20 3 21 Z" fill="url(#bookH)"/>
    <line x1="24" y1="8" x2="6" y2="7" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
    <line x1="24" y1="13" x2="6" y2="12" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
    <path d="M-28 22 Q-14 26 0 24 Q14 26 28 22" fill="none" stroke="#3730A3" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Mini cap -->
  <g transform="translate(34,20)">
    <polygon points="-22,-7 0,-14 22,-7 0,0" fill="url(#capH)"/>
    <rect x="-10" y="-6" width="20" height="13" rx="2" fill="#4338CA"/>
    <line x1="22" y1="-7" x2="22" y2="5" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="22" cy="7" r="2.5" fill="#F59E0B"/>
  </g>

  <!-- Mini stars -->
  <g fill="#F59E0B">
    <path d="M26,40 l2,4 l4.5,0 l-3.5,2.5 l1.5,4.5 l-4.5,-3 l-4.5,3 l1.5,-4.5 l-3.5,-2.5 l4.5,0 Z" transform="scale(0.72) translate(10,8)"/>
    <path d="M34,37 l2.5,5 l5.5,0 l-4.5,3 l1.5,5 l-5,-3.5 l-5,3.5 l1.5,-5 l-4.5,-3 l5.5,0 Z" transform="scale(0.72)"/>
    <path d="M42,40 l2,4 l4.5,0 l-3.5,2.5 l1.5,4.5 l-4.5,-3 l-4.5,3 l1.5,-4.5 l-3.5,-2.5 l4.5,0 Z" transform="scale(0.72) translate(-10,8)"/>
  </g>

  <!-- BRAND NAME -->
  <text x="82" y="36" font-family="Georgia,Times New Roman,serif" font-size="26" font-weight="700" fill="#1E1B4B" letter-spacing="2">VIKASHANA</text>

  <!-- TAGLINE -->
  <text x="83" y="54" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="600" fill="#6366F1" letter-spacing="2.2">SCHOOL MANAGEMENT</text>
</svg>
